name: Mac build

# macOS runners are 10× the cost of Linux, so we only run this on:
#   - explicit changes to anything that affects the .app bundle
#     (Mac shell sources, the React bundle that gets embedded, the
#     Rust server that becomes ia2-server inside the bundle)
#   - tag pushes (the release flow lives in release.yml but this
#     job validates the build first)
# That keeps the Mac runner queue clear for the moments it matters.
#
# Public repo → still free even with the 10× macOS multiplier, but
# the smaller blast radius is also faster overall (Linux jobs aren't
# waiting in line behind us).
on:
  push:
    branches: [main]
    paths:
      - 'apps/mac/**'
      - 'apps/web/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/mac.yml'
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build IA2.app
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target/
        uses: Swatinem/rust-cache@v2

      - name: Install pnpm
        # Version comes from package.json `packageManager` field
        # (pnpm@11.0.9); avoids the "multiple versions specified" error.
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install web deps
        run: pnpm install --frozen-lockfile

      - name: Build release .app
        run: ./apps/mac/build.sh release

      - name: Smoke-test the bundle (launches, hits /api/health, kills)
        run: |
          set -e
          ./apps/mac/build/release/IA2.app/Contents/MacOS/ia2-server \
              --bind 127.0.0.1:0 --print-url --demo-modbus-addr "" \
              > /tmp/url 2> /tmp/err &
          SRV=$!
          # Wait up to 5 s for the URL line.
          for i in $(seq 1 50); do
            sleep 0.1
            test -s /tmp/url && break
          done
          URL=$(cat /tmp/url)
          test -n "$URL" || { echo "server didn't print URL"; cat /tmp/err; exit 1; }
          curl -sf "$URL/api/health" > /tmp/h.json
          cat /tmp/h.json | jq -e '.status == "ok"' > /dev/null
          kill $SRV

      - name: Upload IA2.app as artifact
        uses: actions/upload-artifact@v4
        with:
          name: IA2.app-${{ github.sha }}
          path: apps/mac/build/release/IA2.app
          retention-days: 14
