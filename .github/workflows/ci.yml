name: CI

# Runs on every push and PR. Linux only — Mac builds are gated to
# tags / paths under `.github/workflows/mac.yml` so we don't burn
# macOS runner time on every commit. Public repo → unlimited free
# minutes on Linux runners.
on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs of the same branch on a new push, so the
# latest commit's CI isn't queued behind a stale one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with vendored ironplc submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target/
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        # `cargo test` is also what triggers ts-rs to emit the TS
        # bindings under apps/web/src/types/generated/ — see the
        # upload step below.
        run: cargo test --workspace --quiet

      - name: Upload ts-rs bindings for the web job
        # The web job runs on a separate runner with no Rust, so we
        # ship the generated TS types as an artifact rather than
        # re-installing Rust just to regenerate them.
        uses: actions/upload-artifact@v4
        with:
          name: ts-rs-bindings
          path: apps/web/src/types/generated/
          retention-days: 1
          if-no-files-found: error

  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    needs: rust  # need ts-rs bindings produced by the rust job
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        # Version comes from package.json `packageManager` field
        # (pnpm@11.0.9); avoids the "multiple versions specified" error.
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          # pnpm 11.0.9 (pinned via packageManager) needs Node ≥22.13.
          # Local devs are on 22+ (engines.node is the min), CI matches.
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install deps (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Download ts-rs bindings from the rust job
        uses: actions/download-artifact@v4
        with:
          name: ts-rs-bindings
          path: apps/web/src/types/generated/

      - name: Type-check the web app
        run: cd apps/web && pnpm tsc --noEmit

      - name: Vite build
        run: cd apps/web && pnpm build
