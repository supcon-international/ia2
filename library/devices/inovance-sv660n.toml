# Inovance SV660N servo drive (EtherCAT, CiA 402).
# Validated on the SV660N bench (servo_ec project): connection,
# DC SYNC0 -> OP, and CSP position-loop data round-trip all confirmed.
# The PDI offsets below match the default PDO assignment (0x1600/0x1A00
# default mapping) of these 4 channels; if the field device remaps its
# PDOs, adjust pdi_byte_offset accordingly.
name = "InoSV660N"
protocol = "ethercat"
description = "Inovance SV660N servo drive — CiA 402, CSP; requires DC SYNC0 to reach OP"
vendor_id = 1048576    # 0x00100000 Inovance
product_id = 786701    # 0x000C020D SV660N
requires_dc_sync = "sync0"
recommended_cycle_us = 2000

[[channels]]
name = "controlword"
direction = "rx_pdo"
pdo_index = 24640      # 0x6040
sub_index = 0
bit_length = 16
data_type = "u16"
pdi_byte_offset = 0
pdi_bit_offset = 0

[[channels]]
name = "target_position"
direction = "rx_pdo"
pdo_index = 24698      # 0x607A
sub_index = 0
bit_length = 32
data_type = "i32"
pdi_byte_offset = 2
pdi_bit_offset = 0

[[channels]]
name = "statusword"
direction = "tx_pdo"
pdo_index = 24641      # 0x6041
sub_index = 0
bit_length = 16
data_type = "u16"
pdi_byte_offset = 2
pdi_bit_offset = 0

[[channels]]
name = "position_actual"
direction = "tx_pdo"
pdo_index = 24676      # 0x6064
sub_index = 0
bit_length = 32
data_type = "i32"
pdi_byte_offset = 4
pdi_bit_offset = 0
